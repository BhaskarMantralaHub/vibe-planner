<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Your Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F5F6FA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #F5F6FA;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <!-- Container -->
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" style="max-width: 480px; width: 100%;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 28px; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;">
              <span style="font-size: 26px;">&#10024;</span>
              <span style="color: #7C3AED;"> Viber's</span><span style="color: #1E1E2F;"> Toolkit</span>
            </td>
          </tr>

          <!-- Card wrapper -->
          <tr>
            <td style="background-color: #FFFFFF; border: 1px solid #D8DBFF; border-radius: 16px; overflow: hidden;">

              <!-- Blue accent bar -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="height: 4px; background-color: #3B82F6; font-size: 1px; line-height: 1px;">&nbsp;</td>
                </tr>
              </table>

              <!-- Content area -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding: 36px 32px;">

                    <!-- Icon -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom: 20px;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="56" height="56" align="center" valign="middle" style="background-color: #3B82F6; border-radius: 14px; font-size: 26px; color: #ffffff;">
                                &#128075;
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Heading -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom: 8px; font-size: 24px; font-weight: 700; color: #1E1E2F; letter-spacing: -0.3px;">
                          Welcome to Viber's Toolkit!
                        </td>
                      </tr>
                      <tr>
                        <td align="center" style="padding-bottom: 28px; font-size: 15px; color: #6B7280; line-height: 24px;">
                          Confirm your email address to get started.<br />
                          Click the button below to activate your account.
                        </td>
                      </tr>
                    </table>

                    <!-- Button -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom: 28px;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td align="center" style="background-color: #3B82F6; border-radius: 12px;">
                                <a href="{{ .ConfirmationURL }}"
                                   target="_blank"
                                   style="display: block; padding: 14px 40px; color: #ffffff; font-size: 16px; font-weight: 600; text-decoration: none; letter-spacing: -0.2px;">
                                  Confirm Email
                                </a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Divider -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="padding-bottom: 20px;">
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="height: 1px; background-color: #E5E7EB; font-size: 1px; line-height: 1px;">&nbsp;</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Info note -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="background-color: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #6B7280; line-height: 20px;">
                          <span style="color: #2563EB; font-weight: 600;">&#9432; Note:</span>
                          If you didn't create an account, you can safely ignore this email.
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 24px; font-size: 13px; color: #6B7280;">
              Viber's Toolkit &mdash; Capture Ideas. Align with Flow.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
