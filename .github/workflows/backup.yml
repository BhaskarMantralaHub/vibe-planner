name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC (11 PM PT)
  workflow_dispatch: # Manual trigger from GitHub Actions tab

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKUP_DATE: '' # Set once in first step, shared across all steps
    steps:
      - name: Set backup date
        run: echo "BACKUP_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Dump schema, policies, and roles
        id: schema_dump
        continue-on-error: true
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          mkdir -p "backups/$BACKUP_DATE"

          # Extract project ref from URL (https://xxxx.supabase.co -> xxxx)
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed 's|https://||' | sed 's|\.supabase\.co.*||')

          # URL-encode the password (handles special chars like @, #, %)
          ENCODED_PW=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SUPABASE_DB_PASSWORD', safe=''))")

          # Use session-mode pooler (port 5432, IPv4) with native pg_dump
          # Avoids Docker entirely — no IPv6 issues, no image pull rate limits
          DB_URL="postgresql://postgres.${PROJECT_REF}:${ENCODED_PW}@aws-0-us-west-2.pooler.supabase.com:5432/postgres"

          echo "Dumping schema (tables, RLS policies, functions, triggers, indexes)..."
          pg_dump "$DB_URL" \
            --schema-only \
            --schema=public \
            --no-owner \
            --no-privileges \
            > "backups/$BACKUP_DATE/schema.sql" 2>"backups/$BACKUP_DATE/schema.err" || {
              echo "::error::Schema dump failed:"
              cat "backups/$BACKUP_DATE/schema.err"
              rm -f "backups/$BACKUP_DATE/schema.sql"
            }

          echo "Dumping role grants..."
          pg_dumpall -d "$DB_URL" \
            --roles-only \
            > "backups/$BACKUP_DATE/roles.sql" 2>"backups/$BACKUP_DATE/roles.err" || {
              echo "::error::Roles dump failed:"
              cat "backups/$BACKUP_DATE/roles.err"
              rm -f "backups/$BACKUP_DATE/roles.sql"
            }

          # Validate dump content
          for f in "backups/$BACKUP_DATE/schema.sql" "backups/$BACKUP_DATE/roles.sql"; do
            if [ -s "$f" ]; then
              SIZE=$(wc -c < "$f" | tr -d ' ')
              echo "  → $(basename $f): ${SIZE} bytes"
            else
              echo "  → $(basename $f): MISSING or EMPTY (dump failed)"
            fi
          done

          # Validate schema.sql has real DDL content
          if [ -s "backups/$BACKUP_DATE/schema.sql" ]; then
            if ! grep -q "CREATE TABLE\|CREATE POLICY\|CREATE FUNCTION" "backups/$BACKUP_DATE/schema.sql"; then
              echo "::error::schema.sql exists but contains no DDL statements — removing"
              rm -f "backups/$BACKUP_DATE/schema.sql"
            fi
          fi

          # Clean up stderr files (don't push to backup repo)
          rm -f "backups/$BACKUP_DATE/schema.err" "backups/$BACKUP_DATE/roles.err"

      - name: Export all tables as JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p "backups/$BACKUP_DATE"

          TABLES=(
            "profiles"
            "cricket_teams"
            "team_members"
            "team_invites"
            "cricket_players"
            "cricket_seasons"
            "cricket_expenses"
            "cricket_expense_splits"
            "cricket_settlements"
            "cricket_season_fees"
            "cricket_sponsorships"
            "cricket_gallery"
            "cricket_gallery_tags"
            "cricket_gallery_comments"
            "cricket_gallery_likes"
            "cricket_comment_reactions"
            "cricket_notifications"
            "practice_matches"
            "practice_match_players"
            "practice_innings"
            "practice_balls"
            "cricket_schedule_matches"
            "vibes"
            "id_documents"
            "user_activity"
            "team_audit_log"
            "app_settings"
          )

          for TABLE in "${TABLES[@]}"; do
            echo "Backing up $TABLE..."
            curl -s \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Accept: application/json" \
              -H "Range: 0-999999" \
              "$SUPABASE_URL/rest/v1/$TABLE?select=*" \
              -o "backups/$BACKUP_DATE/$TABLE.json"

            # Validate response is a JSON array (not an error object)
            if ! jq -e 'type == "array"' "backups/$BACKUP_DATE/$TABLE.json" > /dev/null 2>&1; then
              echo "  ⚠️ $TABLE: response is not a JSON array — possible API error"
              cat "backups/$BACKUP_DATE/$TABLE.json"
              echo ""
            else
              COUNT=$(jq length "backups/$BACKUP_DATE/$TABLE.json")
              echo "  → $TABLE: $COUNT rows"
            fi
          done

          echo "$BACKUP_DATE" > backups/latest.txt
          echo "Backup complete: $BACKUP_DATE"

      - name: Push to backup repo
        env:
          BACKUP_TOKEN: ${{ secrets.VIBE_PLANNER_BACKUP }}
        run: |
          git config --global user.name "Backup Bot"
          git config --global user.email "backup@noreply.github.com"

          git clone "https://x-access-token:${BACKUP_TOKEN}@github.com/${{ github.repository_owner }}/vibe-planner-backups.git" backup-repo
          cp -r backups/* backup-repo/

          cd backup-repo

          # Keep only last 30 days of backups
          ls -d 20??-??-?? 2>/dev/null | sort | head -n -30 | while read -r dir; do
            echo "Pruning old backup: $dir"
            rm -rf "$dir"
          done

          git add -A
          git commit -m "backup: $(date +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg to "$SUPER_ADMIN_EMAIL" \
              --arg subject "Daily Backup Failed — Vibers Toolkit" \
              --arg html "<div style='font-family:-apple-system,sans-serif;max-width:480px;margin:0 auto;padding:24px'><div style='background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px'><div style='font-size:16px;font-weight:700;color:#dc2626;margin-bottom:8px'>Daily Backup Failed</div><div style='font-size:13px;color:#666;line-height:20px'>The daily Supabase backup failed to complete. Check <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\" style=\"color:#4DBBEB\">GitHub Actions logs</a> for details.</div></div><div style='text-align:center;margin-top:16px;font-size:11px;color:#aaa'>Vibers Toolkit · viberstoolkit.com</div></div>" \
              '{from: "Vibers Toolkit <noreply@viberstoolkit.com>", to: [$to], subject: $subject, html: $html}'
            )"
