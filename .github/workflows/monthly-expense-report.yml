name: Monthly Expense Report

on:
  schedule:
    - cron: '0 14 1 * *' # 1st of every month at 2 PM UTC (7 AM PT)
  workflow_dispatch:
    inputs:
      recipients:
        description: '"*" for all players, or comma-separated emails (e.g. a@x.com,b@x.com)'
        required: true
        default: '*'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate and send expense report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_INPUT: ${{ github.event.inputs.recipients }}
        run: bash .github/scripts/send-monthly-report.sh

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg to "$SUPER_ADMIN_EMAIL" \
              --arg subject "⚠️ Sunrisers Manteca — Monthly Report Failed" \
              --arg html "<div style='font-family:-apple-system,sans-serif;max-width:480px;margin:0 auto;padding:24px'><div style='background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px'><div style='font-size:16px;font-weight:700;color:#dc2626;margin-bottom:8px'>Sunrisers Manteca — Monthly Report Failed</div><div style='font-size:13px;color:#666;line-height:20px'>The monthly expense report for the cricket team failed to run. Check <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\" style=\"color:#4DBBEB\">GitHub Actions logs</a> for details.</div></div><div style='text-align:center;margin-top:16px;font-size:11px;color:#aaa'>Sunrisers Manteca · viberstoolkit.com</div></div>" \
              '{from: "Sunrisers Manteca <noreply@viberstoolkit.com>", to: [$to], subject: $subject, html: $html}'
            )"
