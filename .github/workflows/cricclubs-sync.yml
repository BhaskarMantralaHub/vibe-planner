name: Weekly cricclubs sync

# Pulls match scorecards from cricclubs.com into the cricclubs_* tables.
# Scheduled for Monday 06:00 UTC (Sunday 23:00 PT) — runs after MTCA's
# weekend matches. Also triggerable manually from the Actions tab.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays at 06:00 UTC
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Season start (MM/DD/YYYY)'
        required: false
        default: '04/01/2026'
      to_date:
        description: 'Season end (MM/DD/YYYY)'
        required: false
        default: '08/31/2026'

concurrency:
  group: cricclubs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scripts/cricclubs-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/cricclubs-sync/package-lock.json

      - name: Pin npm to a known-good version
        # npm 10.5–10.8 has the "Exit handler never called!" bug that returns 0
        # but leaves node_modules empty. Pinning to 10.9+ avoids it.
        run: npm install -g npm@10.9
        working-directory: ./

      - name: Install dependencies
        # Skip Playwright's postinstall browser download — we install Chromium
        # explicitly in a later (cacheable) step. Letting npm + Playwright race
        # during `npm ci` triggers npm's "Exit handler never called!" bug.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-fund --no-audit

      - name: Get Playwright version
        id: pw_version
        run: |
          VERSION=$(node -p "require('playwright/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Bumping the version cache-busts intentionally
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.version }}-v1

      - name: Install Chromium (skip if cache hit)
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (always — covers cache hits too)
        if: steps.pw_cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRICCLUBS_FROM_DATE: ${{ github.event.inputs.from_date || '04/01/2026' }}
          CRICCLUBS_TO_DATE: ${{ github.event.inputs.to_date || '08/31/2026' }}
        run: npm run sync

      - name: Run parser unit tests (regression check)
        if: always()
        run: npm test
