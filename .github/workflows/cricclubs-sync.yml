name: Weekly cricclubs sync

# Pulls match scorecards from cricclubs.com into the cricclubs_* tables.
# Fires 6× per weekend so live scores propagate within ~3 hours of each
# scheduled refresh. Triggerable manually from the Actions tab anytime.
#
# All times are PT match hours converted to UTC (PDT = UTC-7 during the
# 2026 spring/summer season). When DST ends in November, the cron will
# drift 1 hour later in PT — re-evaluate before the next season.

on:
  schedule:
    # ── Saturday matches ──
    - cron: '0 18 * * 6'   # Sat 11:00 AM PT
    - cron: '30 21 * * 6'  # Sat 2:30 PM PT
    - cron: '0 1 * * 0'    # Sat 6:00 PM PT (Sun 01:00 UTC)
    # ── Sunday matches ──
    - cron: '0 18 * * 0'   # Sun 11:00 AM PT
    - cron: '30 21 * * 0'  # Sun 2:30 PM PT
    - cron: '0 1 * * 1'    # Sun 6:00 PM PT (Mon 01:00 UTC)
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Season start (MM/DD/YYYY)'
        required: false
        default: '04/01/2026'
      to_date:
        description: 'Season end (MM/DD/YYYY)'
        required: false
        default: '08/31/2026'

concurrency:
  group: cricclubs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scripts/cricclubs-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No npm cache — a poisoned cache can trigger npm's "Exit handler
          # never called!" bug. Cost is ~10 s extra per run; reliability wins.

      - name: Diagnostic versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          # Delete the macOS-generated lockfile to force fresh resolution on
          # Linux. npm's lockfile-swap path for platform-specific optional
          # deps (esbuild, rollup) is what triggers "Exit handler never called!"
          rm -f package-lock.json
          npm install --no-fund --no-audit

      - name: Dump npm debug log on failure
        if: failure()
        run: |
          echo "── /home/runner/.npm/_logs/ ──"
          ls -la /home/runner/.npm/_logs/ || true
          echo "── most recent debug log ──"
          tail -200 "$(ls -t /home/runner/.npm/_logs/*.log | head -1)" || true

      - name: Get Playwright version
        id: pw_version
        run: |
          VERSION=$(node -p "require('playwright/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Bumping the version cache-busts intentionally
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.version }}-v1

      - name: Install Chromium (skip if cache hit)
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (always — covers cache hits too)
        if: steps.pw_cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRICCLUBS_FROM_DATE: ${{ github.event.inputs.from_date || '04/01/2026' }}
          CRICCLUBS_TO_DATE: ${{ github.event.inputs.to_date || '08/31/2026' }}
        run: npm run sync

      - name: Run parser unit tests (regression check)
        if: always()
        run: npm test
